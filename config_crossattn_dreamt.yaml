# config_crossattn_dreamt.yaml
# Configuration for training PPG+ECG Cross-Attention model on DREAMT dataset

# 数据配置 - 指向extract_dreamt_data.py生成的文件
data:
  ppg_file: "./dreamt_processed/dreamt_ppg_with_labels.h5"
  ecg_file: "./dreamt_processed/dreamt_ecg.h5"
  index_file: "./dreamt_processed/dreamt_subject_index.h5"
  num_workers: 0
  use_sleepppg_test_set: false  # DREAMT数据集不使用SleepPPG-Net的测试集划分

# 训练配置
training:
  batch_size: 2
  num_epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.00001
  patience: 15

# 模型配置
model:
  d_model: 256
  n_heads: 8
  n_fusion_blocks: 3

# 输出配置
output:
  save_dir: "./outputs_dreamt"
  save_frequency: 5

# 混合精度训练
use_amp: true